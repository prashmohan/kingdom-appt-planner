<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Guide - KingShot Planner</title>
    <script src="{{ url_for('static', filename='tailwind.js') }}"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'kvk-gold': '#FBBF24',
                        'kvk-gray': {
                            700: '#374151',
                            800: '#1F2937',
                            900: '#111827',
                        },
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .markdown-content h1 { @apply text-4xl font-bold text-kvk-gold mb-8 border-b border-kvk-gray-700 pb-4 mt-4; }
        .markdown-content h2 { @apply text-2xl font-bold text-gray-100 mt-12 mb-6 border-b border-kvk-gray-700 pb-2; }
        .markdown-content h3 { @apply text-xl font-bold text-gray-200 mt-8 mb-4; }
        .markdown-content p { @apply text-gray-300 leading-loose mb-6; }
        .markdown-content ul { @apply list-disc list-outside ml-6 text-gray-300 mb-6 space-y-2; }
        .markdown-content ol { @apply list-decimal list-outside ml-6 text-gray-300 mb-6 space-y-2; }
        .markdown-content li { @apply pl-2; }
        .markdown-content code { @apply bg-kvk-gray-700 px-1.5 py-0.5 rounded text-sm font-mono text-amber-300; }
        .markdown-content pre { @apply bg-kvk-gray-900 p-6 rounded-lg overflow-x-auto mb-8 border border-kvk-gray-700 shadow-inner; }
        .markdown-content pre code { @apply bg-transparent p-0 text-gray-300; }
        .markdown-content blockquote { @apply border-l-4 border-kvk-gold pl-6 py-1 italic text-gray-400 mb-8 bg-kvk-gray-900/50 rounded-r; }
        .markdown-content hr { @apply border-kvk-gray-700 my-12; }
        .markdown-content a { @apply text-kvk-gold hover:text-amber-300 underline transition-colors; }
        .markdown-content strong { @apply text-gray-100 font-bold; }
    </style>
</head>
<body class="bg-kvk-gray-900 text-gray-200 antialiased">
    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        
        <div class="mb-6">
            <a href="{{ url_for('index') }}" class="text-kvk-gold hover:text-amber-300 transition flex items-center gap-2">
                <span>← Back to Home</span>
            </a>
        </div>

        <div class="bg-kvk-gray-800 p-8 md:p-12 rounded-xl shadow-lg border border-kvk-gray-700">
            <div class="markdown-content">
                {{ content|safe }}
            </div>
        </div>

        <div class="text-center mt-10 text-gray-500 text-sm">
            Kingdom Appointment Planner User Guide
        </div>

    </div>
</body>
</html>
